<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>{{ title or 'ЛР1 + ЛР2 Flask' }}</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="{{ url_for('index') }}">Лабораторные работы Flask</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Задание</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('posts') }}">Посты</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">Об авторе</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('url_params_page') }}">URL параметры</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('headers_page') }}">Заголовки</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('cookies_page') }}">Cookie</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('form_params_page') }}">Параметры формы</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('phone_page') }}">Телефон</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="my-3">
      <div class="container">
        {% block content %}
        <h1>Содержимое по умолчанию</h1>
        {% endblock %}
      </div>
    </main>

    <footer class="site-footer bg-dark text-light py-3 mt-4">
      <div class="container">
        <p class="mb-0">ФИО: Парамонычева Анастасия Васильевна, группа: 241-372</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  </body>
</html>
