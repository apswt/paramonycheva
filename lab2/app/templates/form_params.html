{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Параметры формы</h1>

<form method="post" class="mb-4">
  <div class="mb-3">
    <label class="form-label" for="first_name">Имя</label>
    <input class="form-control" id="first_name" name="first_name" type="text">
  </div>
  <div class="mb-3">
    <label class="form-label" for="message">Сообщение</label>
    <input class="form-control" id="message" name="message" type="text">
  </div>
  <button class="btn btn-primary" type="submit">Отправить</button>
</form>

<h2 class="h4">Отправленные значения</h2>
{% if submitted %}
<ul>
  {% for key, value in submitted %}
  <li>{{ key }} = {{ value }}</li>
  {% endfor %}
</ul>
{% else %}
<p>Форма ещё не отправлялась.</p>
{% endif %}
{% endblock %}
