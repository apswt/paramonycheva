{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Отчёт по страницам</h1>

<table class="table table-bordered align-middle">
  <thead>
    <tr>
      <th>№</th>
      <th>Страница</th>
      <th>Количество посещений</th>
    </tr>
  </thead>
  <tbody>
    {% for row in stats %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ row.path }}</td>
      <td>{{ row.visit_count }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<div class="d-flex gap-2">
  <a class="btn btn-primary" href="{{ url_for('reports.pages_report_export') }}">Экспорт в CSV</a>
  <a class="btn btn-outline-secondary" href="{{ url_for('reports.visit_logs') }}">Назад к журналу</a>
</div>
{% endblock %}
